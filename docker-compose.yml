services:
  python-engine:
    build:
      context: ./python_engine
      dockerfile: Dockerfile
    container_name: multibots-python-engine
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multibots-frontend
    ports:
      - "4200:80"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: multibots-postgres
    environment:
      POSTGRES_DB: multibots
      POSTGRES_USER: multibots
      POSTGRES_PASSWORD: multibots
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multibots -d multibots"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Multibots.Api/Dockerfile
    container_name: multibots-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=multibots;Username=multibots;Password=multibots
      PythonEngine__BaseUrl: http://python-engine:8000
    ports:
      - "5238:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-engine:
        condition: service_started

volumes:
  postgres-data:
